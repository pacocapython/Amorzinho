<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Love Game 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>💘 Acerte o Coração 💘</h1>
    <p>Clique no coração o mais rápido que puder!</p>

    <div class="game-area">
        <div id="heart">❤️</div>
    </div>

    <p id="score">Pontos: 0</p>

    <script>
        const heart = document.getElementById("heart");
        const scoreText = document.getElementById("score");
        let score = 0;

        function moveHeart() {
            const x = Math.random() * 80;
            const y = Math.random() * 60;

            heart.style.left = x + "%";
            heart.style.top = y + "%";
        }

        heart.addEventListener("click", () => {
            score++;
            scoreText.textContent = "Pontos: " + score;
            moveHeart();
        });

        moveHeart();
    </script>

</body>
</html>
